<!DOCTYPE html>

<html>

<head>

    <title>Notes App</title>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            margin-left: 5px;
            cursor: pointer;
        }

        .note {

            background: white;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;

        }
    </style>

</head>

<body>


    <h1>Notes App</h1>


    <input id="noteInput" placeholder="write note">

    <button onclick="addNote()">Add</button>


    <div id="notes"></div>


    <script>


        const API = "//3.7.253.170/notes";


        // load notes

        async function loadNotes() {

            const res = await fetch(API);

            const data = await res.json();

            document.getElementById("notes").innerHTML = data.map(note =>

                `<div class="note">

${note.text}

<button onclick="deleteNote(${note.id})">

delete

</button>

</div>`

            ).join("");

        }


        // add note

        async function addNote() {

            const text = document.getElementById("noteInput").value;

            if (!text) return;

            await fetch(API, {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    text: text

                })

            });

            document.getElementById("noteInput").value = "";

            loadNotes();

        }


        // delete note

        async function deleteNote(id) {

            await fetch(API + "/" + id, {

                method: "DELETE"

            });

            loadNotes();

        }


        loadNotes();


    </script>


</body>

</html>
